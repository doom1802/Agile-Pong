name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate application and database
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Run static and unit checks
        run: |
          npm run lint
          npm run typecheck
          npm run test

      - name: Start local Supabase
        run: npm exec -- supabase start

      - name: Test database and concurrency
        run: npm run test:db

      - name: Install browser test dependencies
        run: npm exec -- playwright install --with-deps chromium webkit

      - name: Run browser tests
        run: npm run test:e2e

      - name: Build production application
        run: npm run build

      - name: Stop local Supabase
        if: always()
        run: npm exec -- supabase stop --no-backup
